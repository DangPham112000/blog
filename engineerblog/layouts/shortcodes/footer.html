<div class="feedback-card" id="feedbackCard">
    <h2 class="feedback-card__title">Help improve my blog</h2>
    <p class="feedback-card__text">Was this page helpful to you?</p>
    <div class="feedback-card__buttons">
        <button class="feedback-card__button" id="yesBtn">👍 Yes</button>
        <button class="feedback-card__button" id="noBtn">👎 No</button>
    </div>
    <p class="feedback-card__text">This page was last modified at <strong>{{ .Page.Date.Format "2006-01-02" }}</strong></p>
    <ul class="feedback-card__list">
        <!-- Security fix: Added rel="noopener noreferrer" to target="_blank" links to prevent reverse tabnabbing and protect user privacy -->
        <li class="feedback-card__list-item"><a class="feedback-card__link" href="https://github.com/DangPham112000/blog" target="_blank" rel="noopener noreferrer">View this page on GitHub</a></li>
        <li class="feedback-card__list-item"><a class="feedback-card__link" href="#" id="linkButton">Report a problem with this content</a></li>
    </ul>
</div>

<div class="feedback-modal" id="formModal">
    <div class="feedback-modal__content feedback-card">
        <div id="formContainer">
            <h2 class="feedback-card__title" id="formTitle">Can I know your name?</h2>
            <form class="feedback-modal__form" id="form" action="https://formspree.io/f/xqejbrqw" method="POST">
                <input class="feedback-modal__input" type="text" name="username" placeholder="Enter your name (optional)">
                <textarea class="feedback-modal__input" name="description" id="formDescription" placeholder="Please describe the problem" style="display: none; height: 100px; resize: vertical;"></textarea>
                <input type="hidden" name="form_type" id="formType" value="">
                <input type="hidden" name="helpful" id="helpfulInput" value="">
                <input type="hidden" name="blog_title" value="{{ .Page.Title }}">
                <input type="hidden" name="blog_url" value="{{ .Page.Permalink }}">
                <input type="hidden" name="_subject" value="New feedback submission from blog">
                <button class="feedback-card__button" type="submit">Send</button>
            </form>
        </div>
        <div id="successMessage" style="display: none; text-align: center;">
            <h2 class="feedback-card__title">Thank you!</h2>
            <p class="feedback-card__text">Your feedback has been submitted.</p>
        </div>
    </div>
</div>

<script>
    const feedbackCardEle = document.getElementById("feedbackCard");
    const formModalEle = document.getElementById('formModal');

    // Move modal to body so its fixed positioning covers the whole screen
    document.body.appendChild(formModalEle);

    const formTitleEle = document.getElementById('formTitle');
    const formDescriptionEle = document.getElementById('formDescription');
    const formTypeEle = document.getElementById('formType');
    const helpfulInputEle = document.getElementById('helpfulInput');

    document.getElementById('yesBtn').addEventListener('click', function(e) {
        e.preventDefault();
        openModal("Can I know your name?", "Like/Dislike", "Yes");
    });

    document.getElementById('noBtn').addEventListener('click', function(e) {
        e.preventDefault();
        openModal("Can I know your name?", "Like/Dislike", "No");
    });

    document.getElementById('linkButton').addEventListener('click', function(e) {
        e.preventDefault();
        openModal("Report a Problem", "Problem Report", "");
        formDescriptionEle.style.display = 'block';
        formDescriptionEle.required = true;
    });

    function openModal(title, formType, helpfulValue) {
        formTitleEle.textContent = title;
        formTypeEle.value = formType;
        helpfulInputEle.value = helpfulValue;

        // Disable helpful field if not submitting like/dislike
        if (!helpfulValue) {
            helpfulInputEle.disabled = true;
        } else {
            helpfulInputEle.disabled = false;
        }

        formModalEle.style.display = 'flex';
    }

    function resetModal() {
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('form').reset();
        formDescriptionEle.style.display = 'none';
        formDescriptionEle.required = false;
        helpfulInputEle.disabled = false;
    }

    function closeModal() {
        formModalEle.style.display = 'none';
        setTimeout(resetModal, 300); // Reset after modal fades out/closes
    }

    window.onclick = function(event) {
        if (event.target === formModalEle) {
            closeModal();
        }
    };

    document.getElementById('form').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const form = e.target;
        const data = new FormData(form);

        // Handle anonymous user
        let username = data.get('username');
        if (!username || username.trim() === '') {
            data.set('username', 'anonymous');
        }

        const action = form.action;

        fetch(action, {
            method: 'POST',
            body: data,
            headers: {
                'Accept': 'application/json'
            }
        }).then(response => {
            if (response.ok) {
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(closeModal, 3000);
            } else {
                alert('Oops! There was a problem submitting your form.');
            }
        }).catch(error => {
            alert('Oops! There was a problem submitting your form.');
        });
    });
</script>
