name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Fetch Hugo themes and submodules
          fetch-depth: 0        # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo Site
        run: |
          cd engineerblog
          hugo --minify -t hugo-book

      - name: Deploy to External Repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: DangPham112000/dangpham112000.github.io
          publish_branch: main
          publish_dir: ./engineerblog/public
          commit_message: "Deploy from ${{ github.repository }}@${{ github.sha }}"
